# OpenAI Codex CLI MCP configuration
# Copy to ~/.codex/config.toml (global) or .codex/config.toml (project)

[mcp_servers.froglet]
command = "node"
args = ["integrations/mcp/froglet/server.js"]
env = { "FROGLET_PROVIDER_URL" = "http://127.0.0.1:8080", "FROGLET_RUNTIME_URL" = "http://127.0.0.1:8081" }
startup_timeout_sec = 15
tool_timeout_sec = 60
