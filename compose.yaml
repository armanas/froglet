services:
  provider:
    build:
      context: .
      target: provider
    image: froglet-provider:local
    environment:
      FROGLET_DATA_ROOT: /data
      FROGLET_DB_PATH: /data/provider.node.db
      FROGLET_PRICE_EXEC_WASM: ${FROGLET_PRICE_EXEC_WASM:-0}
      FROGLET_PAYMENT_BACKEND: lightning
      FROGLET_LIGHTNING_MODE: mock
      FROGLET_PUBLIC_BASE_URL: http://provider:8080
      # Opt-in: make control tokens readable from the host user. Required
      # for host-side MCP / OpenClaw / CI smoke paths that read
      # ./data/runtime/auth.token directly. Defaults to empty (container-
      # only access) so regular `docker compose up` stays at 0o700.
      FROGLET_HOST_READABLE_CONTROL_TOKEN: ${FROGLET_HOST_READABLE_CONTROL_TOKEN:-}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${FROGLET_DATA_ROOT:-./data}:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  runtime:
    build:
      context: .
      target: runtime
    image: froglet-runtime:local
    depends_on:
      provider:
        condition: service_healthy
    environment:
      FROGLET_DATA_ROOT: /data
      FROGLET_DB_PATH: /data/runtime.node.db
      FROGLET_RUNTIME_PROVIDER_BASE_URL: http://provider:8080
      FROGLET_PAYMENT_BACKEND: lightning
      FROGLET_LIGHTNING_MODE: mock
      FROGLET_HOST_READABLE_CONTROL_TOKEN: ${FROGLET_HOST_READABLE_CONTROL_TOKEN:-}
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ${FROGLET_DATA_ROOT:-./data}:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
