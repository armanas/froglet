services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: froglet
      POSTGRES_PASSWORD: froglet
      POSTGRES_DB: marketplace
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ${FROGLET_DATA_ROOT:-./data}/postgres-compose:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U froglet -d marketplace"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  marketplace:
    build:
      context: .
      target: marketplace
    image: froglet-marketplace:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FROGLET_DATA_ROOT: /data
      FROGLET_PAYMENT_BACKEND: none
      FROGLET_IDENTITY_AUTO_GENERATE: "true"
      FROGLET_PUBLIC_BASE_URL: http://127.0.0.1:8090
      MARKETPLACE_DATABASE_URL: postgres://froglet:froglet@postgres:5432/marketplace
      MARKETPLACE_FEED_SOURCES: http://provider:8080
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - ${FROGLET_DATA_ROOT:-./data}/marketplace-compose:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  provider:
    build:
      context: .
      target: provider
    image: froglet-provider:local
    depends_on:
      marketplace:
        condition: service_healthy
    environment:
      FROGLET_DATA_ROOT: /data
      FROGLET_DB_PATH: /data/provider.node.db
      FROGLET_PRICE_EXEC_WASM: ${FROGLET_PRICE_EXEC_WASM:-0}
      FROGLET_PAYMENT_BACKEND: lightning
      FROGLET_LIGHTNING_MODE: mock
      FROGLET_PUBLIC_BASE_URL: http://127.0.0.1:8080
      FROGLET_MARKETPLACE_URL: http://marketplace:8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${FROGLET_DATA_ROOT:-./data}:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  runtime:
    build:
      context: .
      target: runtime
    image: froglet-runtime:local
    depends_on:
      marketplace:
        condition: service_healthy
      provider:
        condition: service_healthy
    environment:
      FROGLET_DATA_ROOT: /data
      FROGLET_DB_PATH: /data/runtime.node.db
      FROGLET_MARKETPLACE_URL: http://marketplace:8080
      FROGLET_RUNTIME_PROVIDER_BASE_URL: http://provider:8080
      FROGLET_PAYMENT_BACKEND: lightning
      FROGLET_LIGHTNING_MODE: mock
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ${FROGLET_DATA_ROOT:-./data}:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
