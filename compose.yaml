services:
  discovery:
    build:
      context: .
      target: discovery
    image: froglet-discovery:local
    environment:
      FROGLET_DISCOVERY_DB_PATH: /discovery-data/discovery.db
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./data/discovery:/discovery-data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9090/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  provider:
    build:
      context: .
      target: provider
    image: froglet-provider:local
    depends_on:
      discovery:
        condition: service_healthy
    environment:
      FROGLET_PRICE_EXEC_WASM: "10"
      FROGLET_PAYMENT_BACKEND: lightning
      FROGLET_LIGHTNING_MODE: mock
      FROGLET_DISCOVERY_MODE: reference
      FROGLET_PUBLIC_BASE_URL: http://provider:8080
      FROGLET_DISCOVERY_URL: http://discovery:9090
      FROGLET_DISCOVERY_PUBLISH: "true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data/provider:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  runtime:
    build:
      context: .
      target: runtime
    image: froglet-runtime:local
    depends_on:
      discovery:
        condition: service_healthy
      provider:
        condition: service_healthy
    environment:
      FROGLET_DISCOVERY_MODE: reference
      FROGLET_DISCOVERY_URL: http://discovery:9090
      FROGLET_PAYMENT_BACKEND: lightning
      FROGLET_LIGHTNING_MODE: mock
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
