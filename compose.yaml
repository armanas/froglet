services:
  marketplace:
    build:
      context: .
      target: marketplace
    image: froglet-marketplace:local
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - marketplace-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9090/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  froglet:
    build:
      context: .
      target: froglet
    image: froglet:local
    depends_on:
      marketplace:
        condition: service_healthy
    environment:
      FROGLET_PRICE_EXEC_WASM: "10"
      FROGLET_PAYMENT_BACKEND: lightning
      FROGLET_LIGHTNING_MODE: mock
      FROGLET_DISCOVERY_MODE: marketplace
      FROGLET_PUBLIC_BASE_URL: http://127.0.0.1:8080
      FROGLET_MARKETPLACE_URL: http://marketplace:9090
      FROGLET_MARKETPLACE_PUBLISH: "true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - froglet-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  froglet-data:
  marketplace-data:
