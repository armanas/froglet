name: Feature request
description: Propose a new capability, surface change, or protocol extension.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Froglet is a protocol plus a reference node. Feature requests land
        fastest when they describe the problem and the constraint, not just a
        desired implementation. For open-ended design discussion, use
        [Discussions](https://github.com/armanas/froglet/discussions) instead
        of filing an issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Who is the user, what are they trying to do, and what's blocking
        them today? One-line answers are fine if they're concrete.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: |
        What would you add, change, or remove? If you already have a
        preferred implementation, describe it. If not, describe the shape
        of the answer (new MCP action, new kernel artifact, new config
        surface, etc.) and leave the details open.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What did you try or consider, and why isn't it enough? This is where
        you save reviewers from suggesting the thing you already ruled out.

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: |
        Does this touch the kernel, a service, an integration, docs, or ops?
        If you're not sure, leave blank.
      placeholder: "e.g. kernel / froglet-services / integrations/mcp / docs"

  - type: checkboxes
    id: checks
    attributes:
      label: I have
      options:
        - label: searched existing issues and discussions for overlap
          required: true
        - label: read [docs/ARCHITECTURE.md](../../docs/ARCHITECTURE.md) and [docs/KERNEL.md](../../docs/KERNEL.md) if this touches the protocol
          required: false
