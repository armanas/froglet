name: CI

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'  # Nightly at 03:17 UTC

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  strict-checks:
    name: Strict Checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r python/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/mcp/froglet/package-lock.json

      - name: Install MCP server dependencies
        run: npm ci --prefix integrations/mcp/froglet

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

      - name: Audit npm dependencies
        run: npm audit --prefix integrations/mcp/froglet --audit-level=high

      - name: Run strict verification matrix
        run: ./scripts/strict_checks.sh

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [strict-checks]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.91.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked --quiet

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --out xml --skip-clean --timeout 300

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cobertura.xml

  binary-install-smoke:
    name: Binary Install Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [strict-checks]

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.91.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Derive release tag
        id: release_meta
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("Cargo.toml").read_text())["package"]["version"]
          print(f"tag=v{version}")
          PY

      - name: Build release binaries
        run: |
          cargo build --release --locked --bin froglet-node -p froglet

      - name: Package release archives
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          mkdir -p dist
          ./scripts/package_release_assets.sh \
            --version "$RELEASE_TAG" \
            --platform linux \
            --arch x86_64 \
            --out-dir dist
          (cd dist && sha256sum froglet-*.tar.gz > SHA256SUMS)
          ./scripts/verify_release_assets.sh --dir dist --version "$RELEASE_TAG" --target linux:x86_64

      - name: Smoke test one-line installer from packaged assets
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: ./scripts/smoke_install_from_assets.sh --assets-dir dist --version "$RELEASE_TAG"

  docs-site:
    name: Docs Site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs site dependencies
        run: npm ci --prefix docs-site

      - name: Run docs site tests
        run: npm test --prefix docs-site

      - name: Build docs site
        env:
          SITE_URL: https://froglet.dev
        run: npm run build --prefix docs-site

  openclaw-node18:
    name: OpenClaw Node 18
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "18"

      - name: Verify OpenClaw plugin on supported minimum Node
        run: |
          node --check integrations/openclaw/froglet/index.js
          node --check integrations/openclaw/froglet/scripts/doctor.mjs
          node --test integrations/openclaw/froglet/test/plugin.test.js \
            integrations/openclaw/froglet/test/config-profiles.test.mjs \
            integrations/openclaw/froglet/test/doctor.test.mjs \
            integrations/openclaw/froglet/test/froglet-client.test.mjs

  docker-compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/mcp/froglet/package-lock.json

      - name: Install MCP server dependencies
        run: npm ci --prefix integrations/mcp/froglet

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build images
        run: docker compose build provider runtime

      - name: Start stack
        # compose.ci.yaml overlays FROGLET_HOST_READABLE_CONTROL_TOKEN=true
        # so /data/runtime/*.token files become host-readable. Needed for
        # the verification step below to see the token file from the
        # runner user. See compose.ci.yaml for rationale and the
        # config::tests::compose_defaults_do_not_make_control_tokens_host_readable
        # test that keeps compose.yaml itself free of this flag.
        run: docker compose -f compose.yaml -f compose.ci.yaml up -d --wait provider runtime

      - name: Wait for provider health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8080/health

      - name: Wait for runtime health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8081/health

      - name: Verify provider descriptor and runtime token
        run: |
          # Runtime auth token stays 0o600 even in host-readable mode (a
          # deliberate invariant: leaking it to the host would let any host
          # user authenticate as a runtime client). Read it via docker exec
          # from inside the container to verify existence + non-emptiness
          # without relaxing the invariant.
          docker compose exec -T runtime test -s /data/runtime/auth.token \
            || { echo "runtime auth token missing or empty"; exit 1; }

          python3 - <<'PY'
          import json
          import urllib.request

          def get_json(url: str) -> dict:
              with urllib.request.urlopen(url) as response:
                  return json.load(response)

          descriptor = get_json("http://127.0.0.1:8080/v1/provider/descriptor")
          endpoints = descriptor["payload"]["transport_endpoints"]
          assert any(
              endpoint["uri"] == "http://provider:8080" for endpoint in endpoints
          ), endpoints

          runtime_health = get_json("http://127.0.0.1:8081/health")
          assert runtime_health.get("status") in ("ok", "healthy", True, "up"), runtime_health
          PY

      - name: Stage runtime auth token for host-side MCP smoke
        run: |
          docker compose exec -T runtime cat /data/runtime/auth.token > "$RUNNER_TEMP/froglet-runtime-auth.token"
          chmod 0600 "$RUNNER_TEMP/froglet-runtime-auth.token"

      - name: Smoke test OpenClaw plugin against compose-backed Froglet
        run: node integrations/openclaw/froglet/test/compose-smoke.mjs

      - name: Smoke test MCP server against compose-backed Froglet
        env:
          FROGLET_RUNTIME_AUTH_TOKEN_PATH: ${{ runner.temp }}/froglet-runtime-auth.token
        run: node integrations/mcp/froglet/test/compose-smoke.mjs

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color provider runtime

      - name: Stop stack
        if: always()
        run: docker compose down -v

  extended-local:
    name: Extended Local Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [strict-checks]

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r python/requirements.txt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Run fuzz tests
        run: ./scripts/test_suite.sh fuzz

      - name: Run black box tests
        run: ./scripts/test_suite.sh blackbox

      - name: Run penetration tests
        run: ./scripts/test_suite.sh pentest

      - name: Run sanity tests
        run: ./scripts/test_suite.sh sanity

  gcp-test-rig:
    name: GCP Test Rig
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run GCP test rig
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          OPENCLAW_API_KEY: ${{ secrets.OPENCLAW_API_KEY }}
          GCP_RIG_CATEGORIES: smoke performance spike soak fuzz blackbox pentest
          FROGLET_TEST_REMOTE_STACK: "1"
          FROGLET_TEST_PROVIDER_URL: http://127.0.0.1:8080
          FROGLET_TEST_RUNTIME_URL: http://127.0.0.1:8081
          FROGLET_TEST_MARKETPLACE_URL: http://127.0.0.1:8090
        run: ./scripts/test_suite.sh gcp_rig

      - name: Run GCP acceptance free lane
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_RIG_CATEGORIES: acceptance
          FROGLET_ACCEPTANCE_TESTS: >-
            python.tests.test_acceptance.AcceptanceTests.test_uat2_free_wasm_compute_within_sla
            python.tests.test_acceptance.AcceptanceTests.test_uat4_wasm_resource_limits_enforced
            python.tests.test_acceptance.AcceptanceTests.test_uat5_event_content_integrity
            python.tests.test_acceptance.AcceptanceTests.test_uat6_kind_isolation
        run: ./scripts/test_suite.sh gcp_rig

      - name: Run GCP acceptance priced lane
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_RIG_CATEGORIES: acceptance
          FROGLET_ACCEPTANCE_TESTS: >-
            python.tests.test_acceptance.AcceptanceTests.test_uat3_priced_service_requires_protocol_deal
          FROGLET_PRICE_EXEC_WASM: "10"
        run: ./scripts/test_suite.sh gcp_rig

      - name: Run GCP compose resilience lane
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_RIG_CATEGORIES: canary chaos
        run: ./scripts/test_suite.sh gcp_rig

      - name: Cleanup GCP resources
        if: always()
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Safety net: delete any leftover froglet-test instances
          gcloud compute instances list \
            --project="$FROGLET_GCP_PROJECT" \
            --filter="name~'^froglet-test-'" \
            --format="value(name,zone)" | while read -r name zone; do
            echo "Cleaning up orphaned instance: $name in $zone"
            gcloud compute instances delete "$name" --zone="$zone" --project="$FROGLET_GCP_PROJECT" --quiet || true
          done
