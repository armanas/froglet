name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  strict-checks:
    name: Strict Checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run strict verification matrix
        run: ./scripts/strict_checks.sh

  docker-starter:
    name: Docker Starter
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build starter images
        run: docker compose build marketplace froglet

      - name: Start starter stack
        run: docker compose up -d --wait marketplace froglet

      - name: Wait for marketplace health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:9090/health

      - name: Wait for froglet health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8080/health

      - name: Verify marketplace publish flow and advertised URLs
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          def get_json(url: str) -> dict:
              with urllib.request.urlopen(url) as response:
                  return json.load(response)

          search = get_json("http://127.0.0.1:9090/v1/marketplace/search?limit=5")
          nodes = search.get("nodes", [])
          assert nodes, "expected at least one marketplace node"
          node = nodes[0]
          clearnet_url = node["descriptor"]["transports"]["clearnet_url"]
          assert clearnet_url == "http://127.0.0.1:8080", clearnet_url

          node_id = node["descriptor"]["node_id"]
          detail = get_json(
              f"http://127.0.0.1:9090/v1/marketplace/nodes/{node_id}"
          )
          assert detail["descriptor"]["transports"]["clearnet_url"] == "http://127.0.0.1:8080"

          descriptor = get_json("http://127.0.0.1:8080/v1/descriptor")
          endpoints = descriptor["payload"]["transport_endpoints"]
          assert any(
              endpoint["uri"] == "http://127.0.0.1:8080" for endpoint in endpoints
          ), endpoints
          PY

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color marketplace froglet

      - name: Stop starter stack
        if: always()
        run: docker compose down -v

  docker-full-runtime:
    name: Docker Full Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate full-runtime Compose configuration
        run: docker compose -f compose.full-runtime.yaml config

      - name: Build full-runtime images
        run: docker compose -f compose.full-runtime.yaml build marketplace froglet

      - name: Start full-runtime stack
        run: |
          mkdir -p ./data
          docker compose -f compose.full-runtime.yaml up -d --wait marketplace froglet

      - name: Wait for marketplace health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:9090/health

      - name: Wait for froglet health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8080/health

      - name: Verify runtime port is reachable
        run: curl --retry 10 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8081/health

      - name: Verify runtime auth token is accessible on host
        run: |
          test -f ./data/runtime/auth.token || { echo "auth token not found on bind-mounted host path"; exit 1; }
          TOKEN=$(cat ./data/runtime/auth.token)
          test -n "$TOKEN" || { echo "auth token file is empty"; exit 1; }

      - name: Show container status
        if: always()
        run: docker compose -f compose.full-runtime.yaml ps

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f compose.full-runtime.yaml logs --no-color marketplace froglet

      - name: Stop full-runtime stack
        if: always()
        run: docker compose -f compose.full-runtime.yaml down -v
