name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  strict-checks:
    name: Strict Checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r python/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/mcp/froglet/package-lock.json

      - name: Install MCP server dependencies
        run: npm ci --prefix integrations/mcp/froglet

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

      - name: Audit npm dependencies
        run: npm audit --prefix integrations/mcp/froglet --audit-level=high

      - name: Run strict verification matrix
        run: ./scripts/strict_checks.sh

  openclaw-node18:
    name: OpenClaw Node 18
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "18"

      - name: Verify OpenClaw plugin on supported minimum Node
        run: |
          node --check integrations/openclaw/froglet/index.js
          node --check integrations/openclaw/froglet/scripts/doctor.mjs
          node --test integrations/openclaw/froglet/test/plugin.test.js \
            integrations/openclaw/froglet/test/config-profiles.test.mjs \
            integrations/openclaw/froglet/test/doctor.test.mjs \
            integrations/openclaw/froglet/test/froglet-client.test.mjs

  docker-three-role:
    name: Docker Three Role
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/mcp/froglet/package-lock.json

      - name: Install MCP server dependencies
        run: npm ci --prefix integrations/mcp/froglet

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build three-role images
        run: docker compose build discovery provider operator runtime

      - name: Start three-role stack
        run: docker compose up -d --wait discovery provider operator runtime

      - name: Wait for discovery health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:9090/health

      - name: Wait for provider health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8080/health

      - name: Wait for operator health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:9191/health

      - name: Wait for runtime health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8081/health

      - name: Verify discovery publish flow and runtime token
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          def get_json(url: str) -> dict:
              with urllib.request.urlopen(url) as response:
                  return json.load(response)

          token_path = "./data/runtime/auth.token"
          assert os.path.exists(token_path), token_path
          assert open(token_path, "r", encoding="utf-8").read().strip(), "runtime auth token is empty"

          req = urllib.request.Request(
              "http://127.0.0.1:9090/v1/discovery/search",
              method="POST",
              headers={"Content-Type": "application/json"},
              data=b"{}",
          )
          with urllib.request.urlopen(req) as response:
              search = json.load(response)
          nodes = search.get("nodes", [])
          assert nodes, "expected at least one discovery node"
          node = nodes[0]
          clearnet_url = node["descriptor"]["transports"]["clearnet_url"]
          assert clearnet_url == "http://provider:8080", clearnet_url

          node_id = node["descriptor"]["node_id"]
          detail = get_json(
              f"http://127.0.0.1:9090/v1/discovery/providers/{node_id}"
          )
          assert detail["descriptor"]["transports"]["clearnet_url"] == "http://provider:8080"

          descriptor = get_json("http://127.0.0.1:8080/v1/provider/descriptor")
          endpoints = descriptor["payload"]["transport_endpoints"]
          assert any(
              endpoint["uri"] == "http://provider:8080" for endpoint in endpoints
          ), endpoints

          operator = get_json("http://127.0.0.1:9191/v1/froglet/status")
          assert operator["service"] == "froglet-operator", operator
          assert operator["healthy"] is True, operator
          PY

      - name: Smoke test OpenClaw plugin against compose-backed Froglet
        run: node integrations/openclaw/froglet/test/compose-smoke.mjs

      - name: Smoke test MCP server against compose-backed Froglet
        run: node integrations/mcp/froglet/test/compose-smoke.mjs

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color discovery provider operator runtime

      - name: Stop three-role stack
        if: always()
        run: docker compose down -v

  extended-local:
    name: Extended Local Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [strict-checks]

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r python/requirements.txt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Run fuzz tests
        run: ./scripts/test_suite.sh fuzz

      - name: Run black box tests
        run: ./scripts/test_suite.sh blackbox

      - name: Run penetration tests
        run: ./scripts/test_suite.sh pentest

      - name: Run sanity tests
        run: ./scripts/test_suite.sh sanity

  gcp-test-rig:
    name: GCP Test Rig
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run GCP test rig
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          OPENCLAW_API_KEY: ${{ secrets.OPENCLAW_API_KEY }}
          GCP_RIG_CATEGORIES: smoke performance spike soak fuzz blackbox pentest
          FROGLET_TEST_REMOTE_STACK: "1"
          FROGLET_TEST_PROVIDER_URL: http://127.0.0.1:8080
          FROGLET_TEST_RUNTIME_URL: http://127.0.0.1:8081
          FROGLET_TEST_DISCOVERY_URL: http://127.0.0.1:9090
          FROGLET_TEST_OPERATOR_URL: http://127.0.0.1:9191
        run: ./scripts/test_suite.sh gcp_rig

      - name: Run GCP acceptance free lane
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_RIG_CATEGORIES: acceptance
          FROGLET_ACCEPTANCE_TESTS: >-
            python.tests.test_acceptance.AcceptanceTests.test_uat1_service_discoverable_via_reference_discovery
            python.tests.test_acceptance.AcceptanceTests.test_uat2_free_wasm_compute_within_sla
            python.tests.test_acceptance.AcceptanceTests.test_uat4_wasm_resource_limits_enforced
            python.tests.test_acceptance.AcceptanceTests.test_uat5_event_content_integrity
            python.tests.test_acceptance.AcceptanceTests.test_uat6_kind_isolation
        run: ./scripts/test_suite.sh gcp_rig

      - name: Run GCP acceptance priced lane
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_RIG_CATEGORIES: acceptance
          FROGLET_ACCEPTANCE_TESTS: >-
            python.tests.test_acceptance.AcceptanceTests.test_uat3_priced_service_requires_protocol_deal
          FROGLET_PRICE_EXEC_WASM: "10"
        run: ./scripts/test_suite.sh gcp_rig

      - name: Run GCP compose resilience lane
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_RIG_CATEGORIES: canary chaos
        run: ./scripts/test_suite.sh gcp_rig

      - name: Cleanup GCP resources
        if: always()
        env:
          FROGLET_GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Safety net: delete any leftover froglet-test instances
          gcloud compute instances list \
            --project="$FROGLET_GCP_PROJECT" \
            --filter="name~'^froglet-test-'" \
            --format="value(name,zone)" | while read -r name zone; do
            echo "Cleaning up orphaned instance: $name in $zone"
            gcloud compute instances delete "$name" --zone="$zone" --project="$FROGLET_GCP_PROJECT" --quiet || true
          done
