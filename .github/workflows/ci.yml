name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  strict-checks:
    name: Strict Checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r python/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run strict verification matrix
        run: ./scripts/strict_checks.sh

  openclaw-node18:
    name: OpenClaw Node 18
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Verify OpenClaw plugin on supported minimum Node
        run: |
          node --check integrations/openclaw/froglet/index.js
          node --check integrations/openclaw/froglet/scripts/doctor.mjs
          node --test integrations/openclaw/froglet/test/plugin.test.js \
            integrations/openclaw/froglet/test/config-profiles.test.mjs \
            integrations/openclaw/froglet/test/doctor.test.mjs \
            integrations/openclaw/froglet/test/froglet-client.test.mjs

  docker-three-role:
    name: Docker Three Role
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build three-role images
        run: docker compose build discovery provider operator runtime

      - name: Start three-role stack
        run: docker compose up -d --wait discovery provider operator runtime

      - name: Wait for discovery health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:9090/health

      - name: Wait for provider health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8080/health

      - name: Wait for operator health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:9191/health

      - name: Wait for runtime health
        run: curl --retry 20 --retry-connrefused --retry-delay 2 --fail --silent --show-error http://127.0.0.1:8081/health

      - name: Verify discovery publish flow and runtime token
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          def get_json(url: str) -> dict:
              with urllib.request.urlopen(url) as response:
                  return json.load(response)

          token_path = "./data/runtime/auth.token"
          assert os.path.exists(token_path), token_path
          assert open(token_path, "r", encoding="utf-8").read().strip(), "runtime auth token is empty"

          req = urllib.request.Request(
              "http://127.0.0.1:9090/v1/discovery/search",
              method="POST",
              headers={"Content-Type": "application/json"},
              data=b"{}",
          )
          with urllib.request.urlopen(req) as response:
              search = json.load(response)
          nodes = search.get("nodes", [])
          assert nodes, "expected at least one discovery node"
          node = nodes[0]
          clearnet_url = node["descriptor"]["transports"]["clearnet_url"]
          assert clearnet_url == "http://provider:8080", clearnet_url

          node_id = node["descriptor"]["node_id"]
          detail = get_json(
              f"http://127.0.0.1:9090/v1/discovery/providers/{node_id}"
          )
          assert detail["descriptor"]["transports"]["clearnet_url"] == "http://provider:8080"

          descriptor = get_json("http://127.0.0.1:8080/v1/provider/descriptor")
          endpoints = descriptor["payload"]["transport_endpoints"]
          assert any(
              endpoint["uri"] == "http://provider:8080" for endpoint in endpoints
          ), endpoints

          operator = get_json("http://127.0.0.1:9191/v1/froglet/status")
          assert operator["service"] == "froglet-operator", operator
          assert operator["healthy"] is True, operator
          PY

      - name: Smoke test OpenClaw plugin against compose-backed Froglet
        run: node integrations/openclaw/froglet/test/compose-smoke.mjs

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color discovery provider operator runtime

      - name: Stop three-role stack
        if: always()
        run: docker compose down -v
