name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  verify-release-metadata:
    name: Verify Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive release metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == "$GITHUB_REF_NAME" ]]; then
            echo "expected tag to start with 'v', got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          owner_lc="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          sha_tag="sha-${GITHUB_SHA::12}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$sha_tag" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo version matches tag
        run: |
          python3 - <<'PY'
          import tomllib
          from pathlib import Path
          import os

          cargo = tomllib.loads(Path("Cargo.toml").read_text())
          cargo_version = cargo["package"]["version"]
          tag_version = os.environ["TAG_VERSION"]
          if cargo_version != tag_version:
              raise SystemExit(
                  f"Cargo.toml version {cargo_version!r} does not match tag {tag_version!r}"
              )
          PY
        env:
          TAG_VERSION: ${{ steps.meta.outputs.version }}

      - name: Verify OpenClaw plugin versions match tag
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          tag_version = os.environ["TAG_VERSION"]
          package_version = json.loads(
              Path("integrations/openclaw/froglet/package.json").read_text()
          )["version"]
          plugin_version = json.loads(
              Path("integrations/openclaw/froglet/openclaw.plugin.json").read_text()
          )["version"]

          if package_version != tag_version:
              raise SystemExit(
                  f"package.json version {package_version!r} does not match tag {tag_version!r}"
              )
          if plugin_version != tag_version:
              raise SystemExit(
                  f"openclaw.plugin.json version {plugin_version!r} does not match tag {tag_version!r}"
              )
          PY
        env:
          TAG_VERSION: ${{ steps.meta.outputs.version }}

  ensure-release:
    name: Ensure GitHub Release Exists
    runs-on: ubuntu-latest
    needs: [verify-release-metadata]

    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
          fi

  build-release-assets:
    name: Build Binary Assets (${{ matrix.platform }}-${{ matrix.arch }})
    needs: [verify-release-metadata, ensure-release]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            platform: linux
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runs-on: macos-14
            platform: darwin
            arch: arm64

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.91.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release binaries
        run: |
          cargo build --release --locked --bin froglet-node -p froglet
          cargo build --release --locked -p froglet-marketplace

      - name: Package archives
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          ./scripts/package_release_assets.sh \
            --version "$RELEASE_TAG" \
            --platform "$RELEASE_PLATFORM" \
            --arch "$RELEASE_ARCH" \
            --out-dir dist

      - name: Upload release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz --clobber

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [verify-release-metadata]

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Compose configurations
        run: |
          docker compose config
          docker compose -f compose.provider.yaml config
          docker compose -f compose.runtime.yaml config
          docker compose -f compose.marketplace.yaml config

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build and push provider image
        env:
          VERSION: ${{ needs.verify-release-metadata.outputs.version }}
          OWNER_LC: ${{ needs.verify-release-metadata.outputs.owner_lc }}
          SHA_TAG: ${{ needs.verify-release-metadata.outputs.sha_tag }}
        run: |
          image="ghcr.io/${OWNER_LC}/froglet-provider"
          docker build \
            --target provider \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -t "${image}:${VERSION}" \
            -t "${image}:${SHA_TAG}" \
            .
          docker push "${image}:${VERSION}"
          docker push "${image}:${SHA_TAG}"

      - name: Build and push runtime image
        env:
          VERSION: ${{ needs.verify-release-metadata.outputs.version }}
          OWNER_LC: ${{ needs.verify-release-metadata.outputs.owner_lc }}
          SHA_TAG: ${{ needs.verify-release-metadata.outputs.sha_tag }}
        run: |
          image="ghcr.io/${OWNER_LC}/froglet-runtime"
          docker build \
            --target runtime \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -t "${image}:${VERSION}" \
            -t "${image}:${SHA_TAG}" \
            .
          docker push "${image}:${VERSION}"
          docker push "${image}:${SHA_TAG}"

      - name: Build and push marketplace image
        env:
          VERSION: ${{ needs.verify-release-metadata.outputs.version }}
          OWNER_LC: ${{ needs.verify-release-metadata.outputs.owner_lc }}
          SHA_TAG: ${{ needs.verify-release-metadata.outputs.sha_tag }}
        run: |
          image="ghcr.io/${OWNER_LC}/froglet-marketplace"
          docker build \
            --target marketplace \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            -t "${image}:${VERSION}" \
            -t "${image}:${SHA_TAG}" \
            .
          docker push "${image}:${VERSION}"
          docker push "${image}:${SHA_TAG}"

      - name: Write release summary
        env:
          VERSION: ${{ needs.verify-release-metadata.outputs.version }}
          OWNER_LC: ${{ needs.verify-release-metadata.outputs.owner_lc }}
          SHA_TAG: ${{ needs.verify-release-metadata.outputs.sha_tag }}
        run: |
          {
            echo "## Published Images"
            echo ""
            echo "- ghcr.io/${OWNER_LC}/froglet-provider:${VERSION}"
            echo "- ghcr.io/${OWNER_LC}/froglet-provider:${SHA_TAG}"
            echo "- ghcr.io/${OWNER_LC}/froglet-runtime:${VERSION}"
            echo "- ghcr.io/${OWNER_LC}/froglet-runtime:${SHA_TAG}"
            echo "- ghcr.io/${OWNER_LC}/froglet-marketplace:${VERSION}"
            echo "- ghcr.io/${OWNER_LC}/froglet-marketplace:${SHA_TAG}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-checksums:
    name: Publish Binary Checksums
    runs-on: ubuntu-latest
    needs: [verify-release-metadata, build-release-assets]

    steps:
      - name: Check out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --pattern "*.tar.gz" --dir dist --clobber

      - name: Verify expected release tarballs
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          expected = sorted(
              [
                  f"froglet-node-{tag}-linux-x86_64.tar.gz",
                  f"froglet-marketplace-{tag}-linux-x86_64.tar.gz",
                  f"froglet-node-{tag}-linux-arm64.tar.gz",
                  f"froglet-marketplace-{tag}-linux-arm64.tar.gz",
                  f"froglet-node-{tag}-darwin-arm64.tar.gz",
                  f"froglet-marketplace-{tag}-darwin-arm64.tar.gz",
              ]
          )
          actual = sorted(path.name for path in Path("dist").glob("*.tar.gz"))
          if actual != expected:
              raise SystemExit(f"unexpected release assets: {actual!r} != {expected!r}")
          PY

      - name: Generate and verify SHA256SUMS
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)
          ./scripts/verify_release_assets.sh \
            --dir dist \
            --version "$RELEASE_TAG" \
            --target linux:x86_64 \
            --target linux:arm64 \
            --target darwin:arm64

      - name: Upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/SHA256SUMS --clobber

      - name: Write binary asset summary
        run: |
          {
            echo "## Published Binary Assets"
            echo ""
            ls -1 dist
          } >> "$GITHUB_STEP_SUMMARY"
